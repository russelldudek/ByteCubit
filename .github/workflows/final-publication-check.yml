name: Final Bytecubit publication check

on:
  push:
    branches: [main]
    paths:
      - qa/final-publication-trigger.txt

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install inspection tools
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Wait for exact public deployment and verify
        env:
          BASE_URL: https://russelldudek.github.io/ByteCubit
        shell: bash
        run: |
          set -euo pipefail
          routes=(
            index.html
            resume.html
            cover-letter.html
            interview-brief.html
            90-day-plan.html
            role-alignment.html
            signal-twin-review.html
            styles.css
            document-layout.css
            brand-tokens.css
            app.js
            document-verification.json
            campaign-audit.md
          )
          pdfs=(
            Russell-Dudek-Bytecubit-Resume.pdf
            Russell-Dudek-Bytecubit-Cover-Letter.pdf
            Russell-Dudek-Bytecubit-Candidate-Thesis-Brief.pdf
            Russell-Dudek-Bytecubit-90-Day-Plan.pdf
            Russell-Dudek-Bytecubit-Role-Alignment-Brief.pdf
            Russell-Dudek-Bytecubit-Signal-Twin-Review.pdf
          )
          mkdir -p /tmp/live/docs
          verified=0
          for attempt in $(seq 1 72); do
            ok=1
            for route in "${routes[@]}"; do
              mkdir -p "/tmp/live/$(dirname "$route")"
              if ! curl --fail --silent --show-error --location --max-time 25 "$BASE_URL/$route" -o "/tmp/live/$route"; then
                ok=0
                break
              fi
              if ! cmp --silent "$route" "/tmp/live/$route"; then
                ok=0
                break
              fi
            done
            if [ "$ok" -eq 1 ]; then
              for pdf in "${pdfs[@]}"; do
                if ! curl --fail --silent --show-error --location --max-time 30 "$BASE_URL/docs/$pdf" -o "/tmp/live/docs/$pdf"; then
                  ok=0
                  break
                fi
                if ! cmp --silent "docs/$pdf" "/tmp/live/docs/$pdf"; then
                  ok=0
                  break
                fi
              done
            fi
            if [ "$ok" -eq 1 ]; then
              verified=1
              break
            fi
            sleep 10
          done
          test "$verified" -eq 1

          grep -q 'View role alignment' /tmp/live/index.html
          grep -q 'Role Alignment Brief' /tmp/live/role-alignment.html
          grep -q 'Candidate Thesis Brief' /tmp/live/interview-brief.html
          grep -q '"status": "passed"' /tmp/live/document-verification.json

          test "$(pdfinfo /tmp/live/docs/Russell-Dudek-Bytecubit-Resume.pdf | awk '/^Pages:/ {print $2}')" = 2
          test "$(pdfinfo /tmp/live/docs/Russell-Dudek-Bytecubit-Cover-Letter.pdf | awk '/^Pages:/ {print $2}')" = 1
          test "$(pdfinfo /tmp/live/docs/Russell-Dudek-Bytecubit-Candidate-Thesis-Brief.pdf | awk '/^Pages:/ {print $2}')" = 2
          test "$(pdfinfo /tmp/live/docs/Russell-Dudek-Bytecubit-90-Day-Plan.pdf | awk '/^Pages:/ {print $2}')" = 2
          test "$(pdfinfo /tmp/live/docs/Russell-Dudek-Bytecubit-Role-Alignment-Brief.pdf | awk '/^Pages:/ {print $2}')" = 1
          test "$(pdfinfo /tmp/live/docs/Russell-Dudek-Bytecubit-Signal-Twin-Review.pdf | awk '/^Pages:/ {print $2}')" = 2

          python - <<'PY'
          from pathlib import Path
          import re, subprocess
          token = 'ma' + 'ndate'
          pattern = re.compile(rf'\b{token}\b', re.I)
          failures = []
          for path in Path('/tmp/live').rglob('*'):
              if not path.is_file():
                  continue
              if path.suffix.lower() == '.pdf':
                  text = subprocess.check_output(['pdftotext', str(path), '-'], text=True)
              elif path.suffix.lower() in {'.html', '.css', '.js', '.json', '.md'}:
                  text = path.read_text(errors='replace')
              else:
                  continue
              if pattern.search(text):
                  failures.append(str(path))
          if failures:
              raise SystemExit('Retired terminology remains in: ' + ', '.join(failures))
          PY

      - name: Write final receipt and remove one-time files
        shell: python
        run: |
          from datetime import datetime, timezone
          from pathlib import Path
          import json, os
          receipt = {
              'status': 'passed',
              'verified_source_head': os.environ['GITHUB_SHA'],
              'verified_at_utc': datetime.now(timezone.utc).isoformat(),
              'live_url': 'https://russelldudek.github.io/ByteCubit/',
              'routes_and_assets_verified': 13,
              'pdfs_verified': 6,
              'total_printed_pages': 10,
              'pdf_pages': {
                  'resume': 2,
                  'cover_letter': 1,
                  'candidate_thesis_brief': 2,
                  'entry_plan': 2,
                  'role_alignment_brief': 1,
                  'signal_twin_review': 2,
              },
              'document_page_use': 'passed',
              'rendered_page_review': 'passed',
              'terminology_scan': 'passed',
              'method': 'Exact public-file comparison against current main, six live PDF comparisons, pagination checks, and HTML/PDF text scan',
          }
          Path('live-verification.json').write_text(json.dumps(receipt, indent=2) + '\n')
          Path('.github/workflows/final-publication-check.yml').unlink(missing_ok=True)
          Path('qa/final-publication-trigger.txt').unlink(missing_ok=True)

      - name: Commit final receipt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record final dense-document publication receipt"
          git pull --rebase origin main
          git push
