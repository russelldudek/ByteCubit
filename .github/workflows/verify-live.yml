name: Verify live Bytecubit campaign
on:
  push:
    branches: [main]
    paths:
      - 'campaign-audit.md'
      - 'index.html'
      - 'styles.css'
      - 'brand-tokens.css'
      - 'app.js'
      - 'qa/check-hero-geometry.py'
      - '.github/workflows/verify-live.yml'
permissions:
  contents: write
concurrency:
  group: verify-live-bytecubit
  cancel-in-progress: false
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Wait for and verify GitHub Pages
        env:
          BASE_URL: https://russelldudek.github.io/ByteCubit
        run: |
          set -euo pipefail
          routes=(
            index.html
            resume.html
            cover-letter.html
            interview-brief.html
            90-day-plan.html
            technical-fit-proof.html
            signal-twin-review.html
            styles.css
            brand-tokens.css
            app.js
            campaign-audit.md
          )
          pdfs=(
            Russell-Dudek-Bytecubit-Resume.pdf
            Russell-Dudek-Bytecubit-Cover-Letter.pdf
            Russell-Dudek-Bytecubit-Interview-Thesis-Brief.pdf
            Russell-Dudek-Bytecubit-90-Day-Plan.pdf
            Russell-Dudek-Bytecubit-Technical-Fit-Proof-Plan.pdf
            Russell-Dudek-Bytecubit-Signal-Twin-Review.pdf
          )
          mkdir -p /tmp/bytecubit-live/docs
          verified=0
          for attempt in $(seq 1 45); do
            ok=1
            for route in "${routes[@]}"; do
              if ! curl --fail --silent --show-error --location --max-time 20 "$BASE_URL/$route" -o "/tmp/bytecubit-live/$route"; then
                ok=0
                break
              fi
              if ! cmp --silent "$route" "/tmp/bytecubit-live/$route"; then
                ok=0
                break
              fi
            done
            if [ "$ok" -eq 1 ]; then
              for pdf in "${pdfs[@]}"; do
                if ! curl --fail --silent --show-error --location --max-time 30 "$BASE_URL/docs/$pdf" -o "/tmp/bytecubit-live/docs/$pdf"; then
                  ok=0
                  break
                fi
                if ! cmp --silent "docs/$pdf" "/tmp/bytecubit-live/docs/$pdf"; then
                  ok=0
                  break
                fi
              done
            fi
            if [ "$ok" -eq 1 ]; then
              verified=1
              break
            fi
            sleep 10
          done
          test "$verified" -eq 1
          grep -q 'Signal Twin Workbench' /tmp/bytecubit-live/index.html
          grep -q 'View Cover Letter' /tmp/bytecubit-live/resume.html
          grep -q 'View Resume' /tmp/bytecubit-live/cover-letter.html
          grep -q 'prefers-reduced-motion:reduce' /tmp/bytecubit-live/styles.css
          grep -q 'applyScenario' /tmp/bytecubit-live/app.js
          for pdf in "${pdfs[@]}"; do
            test -s "/tmp/bytecubit-live/docs/$pdf"
          done
      - name: Install browser geometry dependencies
        run: |
          python -m pip install --disable-pip-version-check playwright==1.55.0
          python -m playwright install --with-deps chromium
      - name: Verify live hero geometry
        env:
          BASE_URL: https://russelldudek.github.io/ByteCubit
        run: python qa/check-hero-geometry.py "$BASE_URL"
      - name: Record verification
        shell: python
        run: |
          from datetime import datetime, timezone
          from pathlib import Path
          import json, os

          head = os.environ['GITHUB_SHA']
          receipt = {
              'status': 'passed',
              'verified_source_head': head,
              'verified_at_utc': datetime.now(timezone.utc).isoformat(),
              'live_url': 'https://russelldudek.github.io/ByteCubit/',
              'routes_verified': 11,
              'pdfs_verified': 6,
              'hero_viewports_verified': 5,
              'method': 'GitHub-hosted HTTP byte comparison plus browser geometry checks across five viewports',
          }
          Path('live-verification.json').write_text(json.dumps(receipt, indent=2) + '\n')

          audit = Path('campaign-audit.md')
          text = audit.read_text()
          passed_line = '- Hero workbench clipping: passed at 1440×900, 1280×800, 768×1024, 390×844, and 320×800 with all readouts and scenario buttons contained.'
          if passed_line not in text:
              anchor = '- Horizontal overflow: 0 at all audited viewports.'
              if anchor not in text:
                  raise SystemExit('Campaign audit is missing the geometry anchor')
              text = text.replace(anchor, anchor + '\n' + passed_line, 1)
          text = text.replace(
              '- A GitHub-hosted release audit fetched eleven live routes and six PDFs and matched them byte-for-byte to the audited `main` checkout.',
              '- A GitHub-hosted release audit fetched eleven live routes and six PDFs, matched them byte-for-byte to the audited `main` checkout, and confirmed the Signal Twin geometry across five responsive viewports.'
          )
          audit.write_text(text)
      - name: Commit verification record
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add campaign-audit.md live-verification.json
          if git diff --cached --quiet; then
            echo "Verification record already current."
          else
            git commit -m "Verify Signal Twin hero geometry"
            git push
          fi
