name: Verify live Bytecubit campaign

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'resume.html'
      - 'cover-letter.html'
      - 'interview-brief.html'
      - '90-day-plan.html'
      - 'role-alignment.html'
      - 'signal-twin-review.html'
      - 'styles.css'
      - 'document-layout.css'
      - 'brand-tokens.css'
      - 'app.js'
      - 'docs/*.pdf'
      - 'document-verification.json'
      - 'campaign-audit.md'
      - 'qa/check-hero-geometry.py'
      - '.github/workflows/verify-live.yml'

permissions:
  contents: write

concurrency:
  group: verify-live-bytecubit
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install PDF and browser verification tools
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils
          python -m pip install --disable-pip-version-check playwright==1.55.0
          python -m playwright install --with-deps chromium

      - name: Wait for and verify GitHub Pages
        env:
          BASE_URL: https://russelldudek.github.io/ByteCubit
        run: |
          set -euo pipefail
          routes=(
            index.html
            resume.html
            cover-letter.html
            interview-brief.html
            90-day-plan.html
            role-alignment.html
            signal-twin-review.html
            styles.css
            document-layout.css
            brand-tokens.css
            app.js
            document-verification.json
            campaign-audit.md
          )
          pdfs=(
            Russell-Dudek-Bytecubit-Resume.pdf
            Russell-Dudek-Bytecubit-Cover-Letter.pdf
            Russell-Dudek-Bytecubit-Candidate-Thesis-Brief.pdf
            Russell-Dudek-Bytecubit-90-Day-Plan.pdf
            Russell-Dudek-Bytecubit-Role-Alignment-Brief.pdf
            Russell-Dudek-Bytecubit-Signal-Twin-Review.pdf
          )
          mkdir -p /tmp/bytecubit-live/docs
          verified=0
          for attempt in $(seq 1 60); do
            ok=1
            for route in "${routes[@]}"; do
              mkdir -p "/tmp/bytecubit-live/$(dirname "$route")"
              if ! curl --fail --silent --show-error --location --max-time 20 "$BASE_URL/$route" -o "/tmp/bytecubit-live/$route"; then
                ok=0
                break
              fi
              if ! cmp --silent "$route" "/tmp/bytecubit-live/$route"; then
                ok=0
                break
              fi
            done
            if [ "$ok" -eq 1 ]; then
              for pdf in "${pdfs[@]}"; do
                if ! curl --fail --silent --show-error --location --max-time 30 "$BASE_URL/docs/$pdf" -o "/tmp/bytecubit-live/docs/$pdf"; then
                  ok=0
                  break
                fi
                if ! cmp --silent "docs/$pdf" "/tmp/bytecubit-live/docs/$pdf"; then
                  ok=0
                  break
                fi
              done
            fi
            if [ "$ok" -eq 1 ]; then
              verified=1
              break
            fi
            sleep 10
          done
          test "$verified" -eq 1

          grep -q 'Signal Twin Workbench' /tmp/bytecubit-live/index.html
          grep -q 'View role alignment' /tmp/bytecubit-live/index.html
          grep -q 'View Cover Letter' /tmp/bytecubit-live/resume.html
          grep -q 'View Resume' /tmp/bytecubit-live/cover-letter.html
          grep -q 'Role Alignment Brief' /tmp/bytecubit-live/role-alignment.html
          grep -q 'Candidate Thesis Brief' /tmp/bytecubit-live/interview-brief.html
          grep -q 'prefers-reduced-motion:reduce' /tmp/bytecubit-live/styles.css
          grep -q 'applyScenario' /tmp/bytecubit-live/app.js
          grep -q '"status": "passed"' /tmp/bytecubit-live/document-verification.json

          test "$(pdfinfo /tmp/bytecubit-live/docs/Russell-Dudek-Bytecubit-Resume.pdf | awk '/^Pages:/ {print $2}')" = 2
          test "$(pdfinfo /tmp/bytecubit-live/docs/Russell-Dudek-Bytecubit-Cover-Letter.pdf | awk '/^Pages:/ {print $2}')" = 1
          test "$(pdfinfo /tmp/bytecubit-live/docs/Russell-Dudek-Bytecubit-Candidate-Thesis-Brief.pdf | awk '/^Pages:/ {print $2}')" = 2
          test "$(pdfinfo /tmp/bytecubit-live/docs/Russell-Dudek-Bytecubit-90-Day-Plan.pdf | awk '/^Pages:/ {print $2}')" = 2
          test "$(pdfinfo /tmp/bytecubit-live/docs/Russell-Dudek-Bytecubit-Role-Alignment-Brief.pdf | awk '/^Pages:/ {print $2}')" = 1
          test "$(pdfinfo /tmp/bytecubit-live/docs/Russell-Dudek-Bytecubit-Signal-Twin-Review.pdf | awk '/^Pages:/ {print $2}')" = 2

          python - <<'PY'
          from pathlib import Path
          import re, subprocess

          token = 'ma' + 'ndate'
          pattern = re.compile(rf'\b{token}\b', re.I)
          failures = []
          for path in Path('/tmp/bytecubit-live').rglob('*'):
              if not path.is_file():
                  continue
              if path.suffix.lower() == '.pdf':
                  text = subprocess.check_output(['pdftotext', str(path), '-'], text=True)
              elif path.suffix.lower() in {'.html', '.css', '.js', '.json', '.md'}:
                  text = path.read_text(errors='replace')
              else:
                  continue
              if pattern.search(text):
                  failures.append(str(path))
          if failures:
              raise SystemExit('Rejected terminology found in live files: ' + ', '.join(failures))
          PY

      - name: Verify live hero geometry
        env:
          BASE_URL: https://russelldudek.github.io/ByteCubit
        run: python qa/check-hero-geometry.py "$BASE_URL"

      - name: Record verification
        shell: python
        run: |
          from datetime import datetime, timezone
          from pathlib import Path
          import json, os

          receipt = {
              'status': 'passed',
              'verified_source_head': os.environ['GITHUB_SHA'],
              'verified_at_utc': datetime.now(timezone.utc).isoformat(),
              'live_url': 'https://russelldudek.github.io/ByteCubit/',
              'routes_and_assets_verified': 13,
              'pdfs_verified': 6,
              'pdf_pages': {
                  'resume': 2,
                  'cover_letter': 1,
                  'candidate_thesis_brief': 2,
                  'entry_plan': 2,
                  'role_alignment_brief': 1,
                  'signal_twin_review': 2,
              },
              'document_page_use': 'passed',
              'terminology_scan': 'passed',
              'hero_viewports_verified': 5,
              'method': 'GitHub-hosted exact-byte comparison, PDF pagination and text checks, plus browser geometry across five viewports',
          }
          Path('live-verification.json').write_text(json.dumps(receipt, indent=2) + '\n')

      - name: Commit verification record
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add live-verification.json
          if git diff --cached --quiet; then
            echo "Verification record already current."
          else
            git commit -m "Verify dense candidate documents live"
            git pull --rebase origin main
            git push
          fi
