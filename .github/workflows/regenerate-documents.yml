name: Regenerate candidate documents

on:
  push:
    branches:
      - main
    paths:
      - document-revision-trigger.txt
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-pdfs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out campaign
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Chromium and PDF inspection tools
        run: |
          npx playwright install --with-deps chromium
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Regenerate PDF documents
        run: |
          find docs -maxdepth 1 -type f \( -name '*Technical-Fit*' -o -name '*Interview-Thesis*' \) -delete
          npm run generate-pdfs

      - name: Verify candidate-first documents
        run: node scripts/verify-documents.mjs

      - name: Commit refreshed and verified documents
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A docs document-verification.json
          if git diff --cached --quiet; then
            echo "No document changes to commit."
          else
            git commit -m "Refresh and verify candidate documents"
            git push
          fi
