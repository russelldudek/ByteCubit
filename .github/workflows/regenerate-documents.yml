name: Regenerate candidate documents

on:
  push:
    branches:
      - main
    paths:
      - document-revision-trigger.txt
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-pdfs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out campaign
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Regenerate PDF documents
        run: |
          rm -f docs/Russell-Dudek-Bytecubit-Technical-Fit-Proof-Plan.pdf
          rm -f docs/Russell-Dudek-Bytecubit-Interview-Thesis-Brief.pdf
          npm run generate-pdfs

      - name: Commit refreshed PDFs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A docs
          if git diff --cached --quiet; then
            echo "No PDF changes to commit."
          else
            git commit -m "Refresh candidate document PDFs"
            git push
          fi
