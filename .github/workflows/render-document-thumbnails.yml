name: Render candidate document thumbnails

on:
  push:
    branches: [main]
    paths:
      - qa/render-documents-trigger.txt

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install rendering tools
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils python3-pil

      - name: Render PDFs to ASCII thumbnails
        shell: python
        run: |
          from pathlib import Path
          from PIL import Image
          import subprocess, tempfile

          docs = [
              ('Resume', 'docs/Russell-Dudek-Bytecubit-Resume.pdf'),
              ('Cover Letter', 'docs/Russell-Dudek-Bytecubit-Cover-Letter.pdf'),
              ('Candidate Thesis Brief', 'docs/Russell-Dudek-Bytecubit-Candidate-Thesis-Brief.pdf'),
              ('90-Day Entry Plan', 'docs/Russell-Dudek-Bytecubit-90-Day-Plan.pdf'),
              ('Role Alignment Brief', 'docs/Russell-Dudek-Bytecubit-Role-Alignment-Brief.pdf'),
              ('Signal Twin Review', 'docs/Russell-Dudek-Bytecubit-Signal-Twin-Review.pdf'),
          ]
          chars = '@%#*+=-:. '
          output = ['RENDERED PDF THUMBNAILS', 'Each page is rendered from the committed PDF at 72 DPI and reduced to a 48 x 62 grayscale map.', 'Dark marks are visible content; long empty row runs reveal unused page regions.', '']
          metrics = []

          with tempfile.TemporaryDirectory() as tmp:
              tmp = Path(tmp)
              for doc_index, (title, pdf) in enumerate(docs):
                  prefix = tmp / f'doc-{doc_index}'
                  subprocess.run(['pdftoppm', '-png', '-r', '72', pdf, str(prefix)], check=True, stdout=subprocess.DEVNULL)
                  pages = sorted(tmp.glob(f'doc-{doc_index}-*.png'))
                  for page_index, page_path in enumerate(pages, 1):
                      image = Image.open(page_path).convert('L')
                      width, height = image.size
                      small = image.resize((48, 62), Image.Resampling.LANCZOS)
                      rows = []
                      for y in range(small.height):
                          row = ''
                          for x in range(small.width):
                              value = small.getpixel((x, y))
                              index = min(len(chars) - 1, int(value / 256 * len(chars)))
                              row += chars[index]
                          rows.append(row.rstrip())
                      threshold = 245
                      pixels = image.load()
                      row_ink = []
                      for y in range(height):
                          dark = sum(1 for x in range(width) if pixels[x, y] < threshold)
                          row_ink.append(dark / width)
                      content_rows = [i for i, value in enumerate(row_ink) if value > 0.002]
                      last_content = max(content_rows) if content_rows else 0
                      bottom_blank_inches = (height - 1 - last_content) / 72
                      ink_ratio = sum(1 for value in image.getdata() if value < threshold) / (width * height)
                      metrics.append((title, page_index, bottom_blank_inches, ink_ratio))
                      output.extend([
                          f'=== {title} | page {page_index} ===',
                          f'bottom blank: {bottom_blank_inches:.2f} in | ink coverage: {ink_ratio:.3%}',
                          *rows,
                          ''
                      ])

          output.append('SUMMARY')
          for title, page, blank, ink in metrics:
              output.append(f'{title} p{page}: bottom blank {blank:.2f} in; ink coverage {ink:.3%}')
          Path('qa').mkdir(exist_ok=True)
          Path('qa/document-renders.txt').write_text('\n'.join(output) + '\n')

      - name: Remove one-time workflow and trigger
        run: |
          rm -f .github/workflows/render-document-thumbnails.yml
          rm -f qa/render-documents-trigger.txt

      - name: Commit rendered inspection
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record rendered document thumbnails"
          git pull --rebase origin main
          git push
